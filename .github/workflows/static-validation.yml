name: Static validation

on:
  pull_request:
  push:
    branches: [dev, staging, main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install static linter
        run: python -m pip install ruff==0.15.10
      - name: Validate addons
        run: python scripts/validate_repository.py
      - name: Check undefined Python names
        run: ruff check . --select F821,F822,F823,F811 --exclude '*/migrations/*'
      - name: Check generated Arabic translations
        run: python generate_ar_po.py --check
